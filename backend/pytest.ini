[pytest]
# anyio MemoryObjectStream channels are left open by starlette's ASGI
# test transport (httpx.ASGITransport) when FastAPI raises an HTTPException
# before the request body is fully consumed.  This is a known limitation of
# the starlette/httpx/anyio stack and cannot be fixed from application code.
filterwarnings =
    ignore::ResourceWarning:anyio
