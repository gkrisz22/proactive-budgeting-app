name: CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Run ESLint
        run: npm run lint

      - name: Build Frontend
        run: npm run build

  backend:
    name: Backend Tests & Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: proactive_user
          POSTGRES_PASSWORD: proactive_password
          POSTGRES_DB: proactive_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ./backend
    env:
      # These match the service credentials
      DATABASE_URL: postgresql://proactive_user:proactive_password@localhost:5432/proactive_db
      SECRET_KEY: ci_super_secret_key_123
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: './backend/requirements.txt'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic Migrations
        run: alembic upgrade head

      - name: Run Pytest
        run: |
          # pytest returns exit code 5 if no tests are collected. 
          # We catch it so the CI doesn't fail when the tests folder is empty initially.
          pytest || ( [ $? -eq 5 ] && echo "No tests found (exit 5), passing pipeline." && exit 0 || exit $? )

  docker:
    name: Docker Compose Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Production Containers
        # Validate that the production docker-compose can build successfully
        run: docker compose -f docker-compose.yml build
